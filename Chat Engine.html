<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>ChatConnect | Premium Messaging</title>
    
    <!-- Favicon -->
    <link rel="icon" type="image/svg+xml" href="data:image/svg+xml,<svg xmlns=%22http://www.w3.org/2000/svg%22 viewBox=%220 0 100 100%22><text y=%22.9em%22 font-size=%2290%22>💬</text></svg>">
    
    <!-- Tailwind CSS for Layout & Styling -->
    <script src="https://cdn.tailwindcss.com"></script>
    <!-- Phosphor Icons for Premium UI Icons -->
    <script src="https://unpkg.com/@phosphor-icons/web"></script>
    <!-- Emoji Picker Element -->
    <script type="module" src="https://cdn.jsdelivr.net/npm/emoji-picker-element@1/index.js"></script>
    
    <script>
        tailwind.config = {
            theme: {
                extend: {
                    colors: {
                        app: {
                            bg: '#0b141a',       
                            panel: '#111b21',    
                            header: '#202c33',   
                            primary: '#00a884',  
                            myMsg: '#005c4b',    
                            theirMsg: '#202c33', 
                            textMain: '#e9edef', 
                            textMuted: '#8696a0',
                            border: '#222d34'    
                        }
                    },
                    fontFamily: {
                        sans: ['Inter', 'Segoe UI', 'Helvetica Neue', 'sans-serif'],
                    }
                }
            }
        }
    </script>
    <style>
        @import url('https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600&display=swap');

        body {
            font-family: 'Inter', sans-serif;
            background-color: #0b141a;
            color: #e9edef;
            overscroll-behavior-y: contain;
        }

        /* Custom Scrollbar */
        ::-webkit-scrollbar { width: 6px; }
        ::-webkit-scrollbar-track { background: transparent; }
        ::-webkit-scrollbar-thumb { background: rgba(134, 150, 160, 0.2); border-radius: 10px; }
        ::-webkit-scrollbar-thumb:hover { background: rgba(134, 150, 160, 0.4); }

        /* Chat Background Pattern */
        .chat-bg {
            background-color: #0b141a;
            background-image: radial-gradient(#202c33 1px, transparent 1px);
            background-size: 20px 20px;
        }

        input:focus, textarea:focus { outline: none; }

        #sidebar { transition: transform 0.3s cubic-bezier(0.4, 0, 0.2, 1); }

        /* Emoji Picker Styling */
        emoji-picker {
            width: 100%;
            max-width: 350px;
            height: 400px;
            --background: #202c33;
            --border-color: #222d34;
            --indicator-color: #00a884;
            --button-hover-background: #111b21;
            position: absolute;
            bottom: 80px;
            left: 20px;
            z-index: 50;
            border-radius: 12px;
            box-shadow: 0 10px 25px rgba(0,0,0,0.5);
        }

        .recording-pulse { animation: pulse 1.5s infinite; }
        @keyframes pulse {
            0% { transform: scale(1); opacity: 1; }
            50% { transform: scale(1.2); opacity: 0.7; }
            100% { transform: scale(1); opacity: 1; }
        }

        audio {
            height: 35px;
            width: 220px;
            filter: invert(100%) hue-rotate(180deg) brightness(1.5);
        }
        @media (max-width: 640px) { audio { width: 180px; } }
        
        .msg-options-trigger { opacity: 0; transition: opacity 0.2s; }
        .group:hover .msg-options-trigger { opacity: 1; }
    </style>
</head>
<body class="h-screen w-full overflow-hidden flex items-center justify-center bg-black">

    <!-- LOGIN / SIGNUP SCREEN -->
    <div id="login-screen" class="fixed inset-0 z-50 flex items-center justify-center bg-app-bg px-4 transition-opacity duration-300">
        <div class="bg-app-panel border border-app-border rounded-2xl p-6 md:p-8 w-full max-w-md shadow-2xl text-center">
            <div class="flex justify-center mb-6 text-app-primary">
                <i class="ph ph-chats-circle text-5xl md:text-6xl"></i>
            </div>
            <h1 id="auth-title" class="text-xl md:text-2xl font-semibold mb-2 text-app-textMain">Welcome Back</h1>
            <p id="auth-subtitle" class="text-app-textMuted mb-6 text-sm">Log in to your account to continue.</p>
            
            <div id="auth-error" class="hidden mb-4 p-3 bg-red-900/30 border border-red-800 rounded text-red-400 text-sm text-left"></div>

            <form id="auth-form" class="space-y-4">
                <div id="name-field" class="hidden">
                    <input type="text" id="username-input" placeholder="Your Display Name" 
                        class="w-full bg-app-header border border-app-border text-app-textMain rounded-lg px-4 py-3 focus:border-app-primary transition-colors placeholder-app-textMuted">
                </div>
                <input type="email" id="email-input" required placeholder="Email Address" 
                    class="w-full bg-app-header border border-app-border text-app-textMain rounded-lg px-4 py-3 focus:border-app-primary transition-colors placeholder-app-textMuted">
                <input type="password" id="password-input" required placeholder="Password" 
                    class="w-full bg-app-header border border-app-border text-app-textMain rounded-lg px-4 py-3 focus:border-app-primary transition-colors placeholder-app-textMuted">
                
                <button type="submit" id="auth-submit-btn" class="w-full bg-app-primary hover:bg-emerald-500 text-black font-semibold rounded-lg px-4 py-3 transition-colors flex items-center justify-center gap-2">
                    <span>Log In</span><i class="ph ph-sign-in font-bold"></i>
                </button>
            </form>

            <div class="mt-6 text-sm text-app-textMuted">
                <span id="auth-toggle-text">Don't have an account?</span> 
                <button id="toggle-auth-mode-btn" class="text-app-primary hover:underline font-medium">Sign up</button>
            </div>
        </div>
    </div>

    <!-- MAIN APP INTERFACE -->
    <div id="app-container" class="w-full h-full max-w-full md:max-w-[1600px] flex hidden bg-app-bg shadow-2xl relative overflow-hidden">
        
        <div id="sidebar-overlay" class="fixed inset-0 bg-black/50 z-30 hidden md:hidden"></div>

        <!-- SIDEBAR -->
        <div class="fixed inset-y-0 left-0 w-[280px] md:w-[350px] lg:w-[400px] flex-shrink-0 flex flex-col border-r border-app-border bg-app-panel h-full z-40 -translate-x-full md:relative md:translate-x-0 transition-transform duration-300" id="sidebar">
            <div class="h-16 bg-app-header flex items-center justify-between px-4 py-2 border-b border-app-border">
                <div class="flex items-center gap-3">
                    <div class="w-9 h-9 md:w-10 md:h-10 rounded-full bg-indigo-500 flex items-center justify-center text-white font-semibold text-lg" id="my-avatar">U</div>
                    <span class="font-medium text-app-textMain truncate max-w-[120px] md:max-w-[150px]" id="my-name-display">User</span>
                </div>
                <div class="flex gap-4 text-app-textMuted">
                    <button id="logout-btn" class="hover:text-red-400 transition-colors" title="Log Out"><i class="ph ph-sign-out text-xl"></i></button>
                    <button id="close-sidebar" class="md:hidden hover:text-app-textMain"><i class="ph ph-x text-xl"></i></button>
                </div>
            </div>

            <div class="p-2 border-b border-app-border">
                <div class="bg-app-header rounded-lg flex items-center px-3 py-1.5">
                    <i class="ph ph-magnifying-glass text-app-textMuted text-lg mr-3"></i>
                    <input type="text" placeholder="Search or start new chat" class="bg-transparent w-full text-sm py-1 text-app-textMain placeholder-app-textMuted">
                </div>
            </div>

            <div class="flex-1 overflow-y-auto">
                <div class="flex items-center px-3 py-3 hover:bg-app-header cursor-pointer transition-colors bg-app-header border-l-4 border-app-primary">
                    <div class="w-12 h-12 rounded-full bg-app-primary flex items-center justify-center text-black flex-shrink-0">
                        <i class="ph ph-globe-hemisphere-west text-2xl"></i>
                    </div>
                    <div class="ml-3 flex-1 border-b border-app-border pb-3 pt-1 overflow-hidden">
                        <div class="flex justify-between items-center mb-1">
                            <h2 class="text-app-textMain font-medium truncate">Global Chat</h2>
                        </div>
                        <p class="text-sm text-app-textMuted truncate">Welcome to the main room!</p>
                    </div>
                </div>
            </div>
        </div>

        <!-- MAIN CHAT AREA -->
        <div class="flex-1 flex flex-col h-full bg-app-bg relative w-full overflow-hidden">
            
            <div class="h-16 bg-app-header flex items-center justify-between px-4 border-b border-app-border z-10 hover:bg-[#2a3942] transition-colors cursor-pointer" id="chat-header-info">
                <div class="flex items-center gap-3 min-w-0">
                    <button id="open-sidebar" class="md:hidden w-8 h-8 flex items-center justify-center text-app-textMuted hover:text-app-textMain -ml-2 mr-1">
                        <i class="ph ph-list text-2xl"></i>
                    </button>
                    <div class="w-9 h-9 md:w-10 md:h-10 rounded-full bg-app-primary flex items-center justify-center text-black flex-shrink-0">
                        <i class="ph ph-globe-hemisphere-west text-lg md:text-xl"></i>
                    </div>
                    <div class="min-w-0">
                        <h2 class="text-app-textMain font-medium truncate">Global Chat</h2>
                        <p class="text-xs text-app-textMuted truncate">Tap here for group info</p>
                    </div>
                </div>
            </div>

            <div class="flex-1 overflow-y-auto p-4 md:p-6 lg:p-8 chat-bg flex flex-col gap-2 relative" id="messages-container">
                <div id="loading-indicator" class="flex justify-center items-center h-full text-app-textMuted flex-col gap-3">
                    <i class="ph ph-spinner-gap animate-spin text-3xl text-app-primary"></i>
                    <p class="text-sm">Syncing secure messages...</p>
                </div>
            </div>

            <!-- Emoji Picker -->
            <div id="emoji-picker-container" class="hidden">
                <emoji-picker></emoji-picker>
            </div>

            <!-- Recording UI Overlay -->
            <div id="recording-ui" class="hidden absolute bottom-20 left-1/2 -translate-x-1/2 bg-app-panel border border-app-primary px-6 py-3 rounded-full flex items-center gap-4 shadow-2xl z-20">
                <div class="w-3 h-3 bg-red-500 rounded-full recording-pulse"></div>
                <span id="recording-timer" class="text-app-textMain font-mono">0:00</span>
                <button id="cancel-recording" class="text-app-textMuted hover:text-red-400"><i class="ph ph-trash text-xl"></i></button>
            </div>

            <!-- Input Area -->
            <div class="bg-app-header px-2 md:px-4 py-3 flex items-end gap-2 md:gap-3 z-10 relative">
                <button id="emoji-btn" class="p-2 text-app-textMuted hover:text-app-textMain transition-colors flex-shrink-0">
                    <i class="ph ph-smiley text-2xl"></i>
                </button>
                
                <form id="message-form" class="flex-1 flex items-end bg-app-panel rounded-xl border border-app-border overflow-hidden">
                    <textarea id="message-input" rows="1" placeholder="Type a message" 
                        class="w-full bg-transparent text-app-textMain px-4 py-2.5 md:py-3 resize-none max-h-32 focus:outline-none placeholder-app-textMuted text-sm md:text-base leading-relaxed"></textarea>
                </form>

                <div class="flex-shrink-0 flex items-end justify-center min-w-[50px] mb-1">
                    <button id="send-btn" class="p-3 bg-app-primary text-black rounded-full hover:bg-emerald-500 transition-transform active:scale-95 shadow-md hidden flex items-center justify-center w-12 h-12">
                        <i class="ph ph-paper-plane-right text-xl weight-fill"></i>
                    </button>
                    <button id="mic-btn" class="p-3 text-app-textMuted hover:text-app-primary transition-colors flex items-center justify-center w-12 h-12">
                        <i class="ph ph-microphone text-2xl"></i>
                    </button>
                    <button id="stop-mic-btn" class="p-3 bg-red-500 text-white rounded-full hover:bg-red-600 transition-transform active:scale-95 shadow-md hidden flex items-center justify-center w-12 h-12">
                        <i class="ph ph-stop text-xl weight-fill"></i>
                    </button>
                </div>
            </div>
        </div>
    </div>

    <!-- MODALS -->
    
    <!-- Group Info Modal -->
    <div id="group-info-modal" class="fixed inset-0 z-[60] hidden flex items-center justify-center bg-black/60 px-4 transition-opacity">
        <div class="bg-app-panel border border-app-border rounded-2xl w-full max-w-sm shadow-2xl overflow-hidden flex flex-col max-h-[80vh]">
            <div class="h-16 bg-app-header flex items-center justify-between px-5 border-b border-app-border">
                <h2 class="text-app-textMain font-semibold text-lg">Group Info</h2>
                <button id="close-group-info" class="text-app-textMuted hover:text-app-textMain"><i class="ph ph-x text-xl"></i></button>
            </div>
            <div class="p-5 overflow-y-auto flex-1 chat-bg" id="group-info-list">
                <!-- Users listed here -->
            </div>
        </div>
    </div>

    <!-- Message Actions Modal -->
    <div id="message-action-modal" class="fixed inset-0 z-[60] hidden flex items-end md:items-center justify-center bg-black/50 px-4 transition-opacity pb-8 md:pb-0">
        <div class="bg-app-panel border border-app-border rounded-2xl w-full max-w-xs shadow-2xl overflow-hidden flex flex-col transform transition-transform translate-y-full md:translate-y-0" id="message-action-content">
            <div class="p-4 border-b border-app-border">
                <h2 class="text-app-textMain font-medium text-center">Message Actions</h2>
            </div>
            <div class="flex flex-col p-2 gap-1">
                <button id="btn-delete-me" class="px-4 py-3 text-left text-app-textMain hover:bg-app-header rounded-lg flex items-center gap-3">
                    <i class="ph ph-trash text-lg text-red-400"></i> Delete for me
                </button>
                <button id="btn-delete-everyone" class="px-4 py-3 text-left text-app-textMain hover:bg-app-header rounded-lg flex items-center gap-3 hidden">
                    <i class="ph ph-warning-circle text-lg text-red-500"></i> Delete for everyone
                </button>
                <button id="btn-cancel-action" class="px-4 py-3 text-center text-app-textMuted hover:bg-app-header rounded-lg mt-2 font-medium">
                    Cancel
                </button>
            </div>
        </div>
    </div>


    <!-- FIREBASE & APP LOGIC -->
    <script type="module">
        import { initializeApp } from "https://www.gstatic.com/firebasejs/11.6.1/firebase-app.js";
        import { getFirestore, collection, addDoc, onSnapshot, serverTimestamp, doc, setDoc, getDocs, updateDoc, deleteDoc, arrayUnion } from "https://www.gstatic.com/firebasejs/11.6.1/firebase-firestore.js";
        import { getAuth, createUserWithEmailAndPassword, signInWithEmailAndPassword, onAuthStateChanged, updateProfile, signOut } from "https://www.gstatic.com/firebasejs/11.6.1/firebase-auth.js";

        const firebaseConfig = {
            apiKey: "AIzaSyByhs1eCCI4dkg-Rbr83VhEi2eBovSI0e0",
            authDomain: "chat-539a9.firebaseapp.com",
            projectId: "chat-539a9",
            storageBucket: "chat-539a9.firebasestorage.app",
            messagingSenderId: "327765971008",
            appId: "1:327765971008:web:a2b30330aff8b908980fa5",
            measurementId: "G-Z86P2XGSZ7"
        };

        const app = initializeApp(firebaseConfig);
        const db = getFirestore(app);
        const auth = getAuth(app);

        let currentUser = null;
        let messagesList = [];
        let unsubscribeMessages = null;
        let activeMessageId = null;

        // Elements
        const loginScreen = document.getElementById('login-screen');
        const appContainer = document.getElementById('app-container');
        const messagesContainer = document.getElementById('messages-container');
        const messageInput = document.getElementById('message-input');
        const sendBtn = document.getElementById('send-btn');
        const micBtn = document.getElementById('mic-btn');
        const stopMicBtn = document.getElementById('stop-mic-btn');
        const emojiBtn = document.getElementById('emoji-btn');
        const emojiPickerContainer = document.getElementById('emoji-picker-container');
        
        // Modals
        const groupInfoModal = document.getElementById('group-info-modal');
        const groupInfoList = document.getElementById('group-info-list');
        const msgActionModal = document.getElementById('message-action-modal');
        const msgActionContent = document.getElementById('message-action-content');
        const btnDeleteMe = document.getElementById('btn-delete-me');
        const btnDeleteEveryone = document.getElementById('btn-delete-everyone');

        // === USER TRACKING ===
        async function trackUserPresence(user) {
            try {
                const userRef = doc(db, 'users', user.uid);
                await setDoc(userRef, {
                    name: user.displayName || 'User',
                    lastActive: serverTimestamp(),
                    email: user.email
                }, { merge: true });
            } catch (e) { console.error("Could not update presence", e); }
        }

        // === EMOJI LOGIC ===
        emojiBtn.addEventListener('click', () => emojiPickerContainer.classList.toggle('hidden'));
        document.querySelector('emoji-picker').addEventListener('emoji-click', event => {
            messageInput.value += event.detail.unicode;
            toggleSendButtons();
            messageInput.focus();
        });
        document.addEventListener('click', (e) => {
            if (!emojiBtn.contains(e.target) && !emojiPickerContainer.contains(e.target)) {
                emojiPickerContainer.classList.add('hidden');
            }
        });

        // === VOICE LOGIC ===
        let mediaRecorder = null;
        let audioChunks = [];
        let recordingTimerInterval = null;
        let recordingStartTime = null;

        micBtn.addEventListener('click', async () => {
            try {
                const stream = await navigator.mediaDevices.getUserMedia({ audio: true });
                mediaRecorder = new MediaRecorder(stream);
                audioChunks = [];

                mediaRecorder.ondataavailable = e => audioChunks.push(e.data);
                mediaRecorder.onstop = async () => {
                    const audioBlob = new Blob(audioChunks, { type: 'audio/webm' });
                    if (audioChunks.length > 0) await sendVoiceMessage(audioBlob);
                    stream.getTracks().forEach(track => track.stop());
                };

                mediaRecorder.start();
                recordingStartTime = Date.now();
                recordingTimerInterval = setInterval(() => {
                    const sec = Math.floor((Date.now() - recordingStartTime) / 1000);
                    document.getElementById('recording-timer').textContent = `${Math.floor(sec/60)}:${(sec%60).toString().padStart(2,'0')}`;
                }, 1000);
                
                micBtn.classList.add('hidden');
                stopMicBtn.classList.remove('hidden');
                document.getElementById('recording-ui').classList.remove('hidden');
            } catch (err) { alert("Microphone access required for voice messages."); }
        });

        stopMicBtn.addEventListener('click', () => stopRecording(true));
        document.getElementById('cancel-recording').addEventListener('click', () => stopRecording(false));

        function stopRecording(shouldSend) {
            if (!mediaRecorder) return;
            if (!shouldSend) audioChunks = []; // Clear to prevent sending
            mediaRecorder.stop();
            clearInterval(recordingTimerInterval);
            document.getElementById('recording-timer').textContent = "0:00";
            micBtn.classList.remove('hidden');
            stopMicBtn.classList.add('hidden');
            document.getElementById('recording-ui').classList.add('hidden');
        }

        async function sendVoiceMessage(blob) {
            const reader = new FileReader();
            reader.readAsDataURL(blob);
            reader.onloadend = async () => {
                await addDoc(collection(db, "global_messages"), {
                    type: 'voice',
                    audioData: reader.result,
                    senderId: currentUser.id,
                    senderName: currentUser.name,
                    timestamp: serverTimestamp()
                });
            };
        }

        // === AUTH LOGIC ===
        onAuthStateChanged(auth, async (user) => {
            if (user) {
                currentUser = { id: user.uid, name: user.displayName || 'User' };
                await trackUserPresence(user);
                loginScreen.classList.add('hidden');
                appContainer.classList.remove('hidden');
                document.getElementById('my-name-display').textContent = currentUser.name;
                document.getElementById('my-avatar').textContent = currentUser.name.charAt(0).toUpperCase();
                setupFirebaseListeners();
            } else {
                currentUser = null;
                appContainer.classList.add('hidden');
                loginScreen.classList.remove('hidden');
                if (unsubscribeMessages) unsubscribeMessages();
            }
        });

        document.getElementById('auth-form').addEventListener('submit', async (e) => {
            e.preventDefault();
            const email = document.getElementById('email-input').value.trim();
            const password = document.getElementById('password-input').value;
            const name = document.getElementById('username-input').value.trim();
            const isSignUp = !document.getElementById('name-field').classList.contains('hidden');

            try {
                if (isSignUp) {
                    const cred = await createUserWithEmailAndPassword(auth, email, password);
                    await updateProfile(cred.user, { displayName: name });
                } else await signInWithEmailAndPassword(auth, email, password);
            } catch (error) {
                const err = document.getElementById('auth-error');
                err.textContent = error.message.replace('Firebase: ', '');
                err.classList.remove('hidden');
            }
        });

        document.getElementById('logout-btn').addEventListener('click', () => signOut(auth));
        document.getElementById('toggle-auth-mode-btn').addEventListener('click', () => {
            const isSignUp = document.getElementById('name-field').classList.toggle('hidden');
            document.getElementById('auth-title').textContent = isSignUp ? "Create an Account" : "Welcome Back";
            document.getElementById('auth-submit-btn').innerHTML = isSignUp ? `<span>Sign Up</span><i class="ph ph-user-plus font-bold"></i>` : `<span>Log In</span><i class="ph ph-sign-in font-bold"></i>`;
        });

        // === CHAT LOGIC ===
        function setupFirebaseListeners() {
            unsubscribeMessages = onSnapshot(collection(db, "global_messages"), (snapshot) => {
                const indicator = document.getElementById('loading-indicator');
                if (indicator) indicator.remove();

                const newMessages = [];
                snapshot.forEach((doc) => newMessages.push({ id: doc.id, ...doc.data() }));
                newMessages.sort((a, b) => (a.timestamp?.toMillis() || 0) - (b.timestamp?.toMillis() || 0));
                messagesList = newMessages;
                renderMessages();
            });
        }

        function renderMessages() {
            const isAtBottom = messagesContainer.scrollHeight - messagesContainer.scrollTop <= messagesContainer.clientHeight + 100;
            messagesContainer.innerHTML = '';
            
            let lastSenderId = null;
            messagesList.forEach((msg) => {
                // If message is deleted for current user, skip rendering completely
                if (msg.deletedFor && msg.deletedFor.includes(currentUser.id)) return;

                const isMine = msg.senderId === currentUser.id;
                const isConsecutive = lastSenderId === msg.senderId;
                const timeString = msg.timestamp ? new Date(msg.timestamp.toDate()).toLocaleTimeString([], { hour: '2-digit', minute: '2-digit' }) : '';

                const msgElement = document.createElement('div');
                msgElement.className = `flex w-full group ${isMine ? 'justify-end' : 'justify-start'} ${isConsecutive ? 'mt-1' : 'mt-3'}`;
                
                let contentHTML = msg.type === 'voice' 
                    ? `<div class="flex flex-col gap-1 pr-4"><audio controls src="${msg.audioData}"></audio><span class="text-[10px] text-app-textMuted text-right">${timeString}</span></div>` 
                    : `<div class="flex items-end gap-3 flex-wrap pr-4">
                        <span class="text-[14px] md:text-[15px] text-app-textMain leading-snug whitespace-pre-wrap break-words inline-block pb-1">${escapeHTML(msg.text)}</span>
                        <div class="flex items-center gap-1 text-[10px] md:text-[11px] text-app-textMuted ml-auto pb-1 mt-1 -mr-3">
                            <span>${timeString}</span>${isMine ? '<i class="ph ph-checks text-app-textMuted"></i>' : ''}
                        </div>
                    </div>`;

                // Caret icon for dropdown action
                const caretHTML = `<button class="absolute top-1 right-1 msg-options-trigger p-1 text-app-textMuted hover:text-white rounded-full bg-black/20" onclick="window.openMessageMenu('${msg.id}', '${msg.senderId}')"><i class="ph ph-caret-down"></i></button>`;

                msgElement.innerHTML = `
                    <div class="relative max-w-[88%] md:max-w-[70%] px-3 py-1.5 rounded-lg shadow-sm ${isMine ? 'bg-app-myMsg' : 'bg-app-theirMsg'} ${!isConsecutive ? (isMine ? 'rounded-tr-none msg-tail-out' : 'rounded-tl-none msg-tail-in') : ''}">
                        ${!isMine && !isConsecutive ? `<div class="text-[12px] font-medium mb-0.5 text-orange-400">${escapeHTML(msg.senderName)}</div>` : ''}
                        ${contentHTML}
                        ${caretHTML}
                    </div>
                `;
                messagesContainer.appendChild(msgElement);
                lastSenderId = msg.senderId;
            });

            if (isAtBottom) messagesContainer.scrollTop = messagesContainer.scrollHeight;
        }

        async function sendMessage() {
            const text = messageInput.value.trim();
            if (!text) return;
            messageInput.value = '';
            toggleSendButtons();
            await addDoc(collection(db, "global_messages"), {
                type: 'text', text: text,
                senderId: currentUser.id, senderName: currentUser.name,
                timestamp: serverTimestamp(), deletedFor: []
            });
        }

        sendBtn.addEventListener('click', sendMessage);
        messageInput.addEventListener('keydown', e => { if (e.key === 'Enter' && !e.shiftKey) { e.preventDefault(); sendMessage(); } });
        messageInput.addEventListener('input', toggleSendButtons);

        function toggleSendButtons() {
            const hasText = messageInput.value.trim().length > 0;
            micBtn.classList.toggle('hidden', hasText);
            sendBtn.classList.toggle('hidden', !hasText);
        }

        function escapeHTML(str) {
            const div = document.createElement('div');
            div.innerText = str || '';
            return div.innerHTML;
        }

        // === MESSAGE DELETION LOGIC ===
        window.openMessageMenu = (msgId, senderId) => {
            activeMessageId = msgId;
            msgActionModal.classList.remove('hidden');
            setTimeout(() => msgActionContent.classList.remove('translate-y-full'), 10);
            
            if (senderId === currentUser.id) {
                btnDeleteEveryone.classList.remove('hidden');
            } else {
                btnDeleteEveryone.classList.add('hidden');
            }
        };

        const closeActionMenu = () => {
            msgActionContent.classList.add('translate-y-full');
            setTimeout(() => msgActionModal.classList.add('hidden'), 200);
            activeMessageId = null;
        };

        document.getElementById('btn-cancel-action').addEventListener('click', closeActionMenu);
        msgActionModal.addEventListener('click', (e) => { if (e.target === msgActionModal) closeActionMenu(); });

        btnDeleteMe.addEventListener('click', async () => {
            if (!activeMessageId) return;
            const msgRef = doc(db, 'global_messages', activeMessageId);
            await updateDoc(msgRef, { deletedFor: arrayUnion(currentUser.id) });
            closeActionMenu();
        });

        btnDeleteEveryone.addEventListener('click', async () => {
            if (!activeMessageId) return;
            await deleteDoc(doc(db, 'global_messages', activeMessageId));
            closeActionMenu();
        });

        // === GROUP INFO LOGIC ===
        document.getElementById('chat-header-info').addEventListener('click', async () => {
            groupInfoModal.classList.remove('hidden');
            groupInfoList.innerHTML = '<div class="text-center p-6 text-app-textMuted"><i class="ph ph-spinner-gap animate-spin text-3xl"></i></div>';
            
            try {
                const usersSnap = await getDocs(collection(db, 'users'));
                let users = [];
                usersSnap.forEach(doc => users.push({ id: doc.id, ...doc.data() }));
                
                // Sort: current user to top, then alphabetical
                users.sort((a, b) => {
                    if (a.id === currentUser.id) return -1;
                    if (b.id === currentUser.id) return 1;
                    return a.name.localeCompare(b.name);
                });

                groupInfoList.innerHTML = users.map(u => `
                    <div class="flex items-center gap-3 p-3 mb-2 rounded-xl bg-app-header border border-app-border hover:bg-[#2a3942] transition-colors">
                        <div class="w-11 h-11 rounded-full bg-indigo-500 flex items-center justify-center text-white font-bold text-lg flex-shrink-0">
                            ${u.name.charAt(0).toUpperCase()}
                        </div>
                        <div class="flex-1 overflow-hidden">
                            <div class="text-app-textMain font-medium truncate">${escapeHTML(u.name)} ${u.id === currentUser.id ? '<span class="text-app-primary text-xs ml-1">(You)</span>' : ''}</div>
                        </div>
                    </div>
                `).join('');
            } catch (err) {
                groupInfoList.innerHTML = `<div class="text-red-400 p-4 text-center text-sm">Could not load users.</div>`;
            }
        });

        document.getElementById('close-group-info').addEventListener('click', () => groupInfoModal.classList.add('hidden'));
        groupInfoModal.addEventListener('click', (e) => { if (e.target === groupInfoModal) groupInfoModal.classList.add('hidden'); });

        // Mobile Sidebar Controls
        document.getElementById('open-sidebar').addEventListener('click', () => {
            document.getElementById('sidebar').classList.remove('-translate-x-full');
            document.getElementById('sidebar-overlay').classList.remove('hidden');
        });
        document.getElementById('close-sidebar').addEventListener('click', () => {
            document.getElementById('sidebar').classList.add('-translate-x-full');
            document.getElementById('sidebar-overlay').classList.add('hidden');
        });
    </script>
</body>
</html>
